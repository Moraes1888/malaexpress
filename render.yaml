services:
  - type: web
    name: malaexpress
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: MALAEXPRESS_DATA_DIR
        value: /var/data/malaexpress
      - key: MALAEXPRESS_DB_PATH
        value: /var/data/malaexpress/mala_express.db
      - key: MALAEXPRESS_BACKUP_DIR
        value: /var/data/malaexpress/backups
      - key: MALAEXPRESS_IMAGES_DIR
        value: /var/data/malaexpress/imagens_malas
    disk:
      name: malaexpress-data
      mountPath: /var/data/malaexpress
      sizeGB: 5
